<!DOCTYPE html>
<html>
<head>
  <title>Heltelo® ChatGFT v0 Preview</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { color-scheme: dark; }
    body { display: flex; flex-direction: column; }
    #chat { flex: 1; overflow-y: auto; padding: 10px; }
    .msg { max-width: 70%; margin: 6px 0; white-space: pre-wrap; word-wrap: break-word; }
    .user { margin-left: auto; }
    .bot { margin-right: auto; }
    #textin { display: flex; padding: 10px; border-top: 1px solid #444; }
    #input  { flex: 1; }
  </style>
</head>
<body>
  <i>A preview of our upcoming ChatGFT model, running in your browser.</i>

  <div id="chat"></div>
  <div id="textin">
    <textarea id="input" rows="2">The </textarea>
    <button onclick="clicksend()">send</button>
  </div>

  <script src="bundle.min.js"></script>
</body>
</html>
